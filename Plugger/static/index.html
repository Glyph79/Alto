<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alto Plugin Crafter 0.2a</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://unpkg.com/blockly/blockly.min.js"></script>
    <script type="module" src="/static/js/main.js"></script>
</head>
<body>
    <header>
        <h1>Alto Plugin Crafter 0.2a</h1>
        <button id="newPluginBtn">+ New Plugin</button>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <h3>Search</h3>
            <input type="text" id="searchInput" placeholder="Search plugins...">
            <h3>Sort By</h3>
            <select id="sortSelect">
                <option value="name-asc">Name (A-Z)</option>
                <option value="name-desc">Name (Z-A)</option>
                <option value="version-desc">Version (newest first)</option>
                <option value="version-asc">Version (oldest first)</option>
            </select>
        </div>
        <div class="content">
            <div id="pluginsGridContainer"></div>
            <div id="emptyState" class="empty-state">
                <p>No plugins yet. Click "New Plugin" to create one.</p>
            </div>
        </div>
    </div>

    <!-- Plugin Edit Modal -->
    <div id="pluginModal" class="modal">
        <div class="modal-content modal-large">
            <h2 id="pluginModalTitle">Edit Plugin</h2>
            <div class="form-row">
                <label>Plugin Name</label>
                <input type="text" id="pluginName" placeholder="e.g., Weather">
            </div>
            <div class="form-row">
                <label>Version</label>
                <input type="text" id="pluginVersion" placeholder="1.0.0">
            </div>
            <div class="form-row">
                <label>Description</label>
                <textarea id="pluginDescription" rows="2" placeholder="What does this plugin do?"></textarea>
            </div>
            <hr>
            <div class="form-row">
                <label>Triggers (what the user says)</label>
                <ul id="triggersList" class="qa-list"></ul>
                <button id="addTriggerBtn" class="add-btn">+ Add Trigger</button>
            </div>
            <div class="form-row">
                <button id="editRootScriptBtn" class="add-btn">✎ Edit Root Response Script</button>
            </div>
            <div class="form-row">
                <button id="editTreeBtn" class="add-btn">🌳 Edit Follow‑up Tree</button>
            </div>
            <div class="modal-actions">
                <button class="cancel" id="pluginCancelBtn">Cancel</button>
                <button class="save" id="pluginSaveBtn">Save Plugin</button>
            </div>
        </div>
    </div>

    <!-- Tree Editor Modal -->
    <div id="treeModal" class="modal">
        <div class="modal-content tree-modal-content">
            <h2>Follow‑up Tree Editor</h2>
            <div class="tree-layout">
                <div class="tree-column">
                    <div id="nodeEditorPanel" style="display: none;">
                        <h3>Node Details</h3>
                        <div class="form-row">
                            <label>Questions (activation phrases)</label>
                            <ul id="nodeQuestionsList" class="qa-list"></ul>
                            <button id="addNodeQuestionBtn" class="add-btn">+ Add Question</button>
                        </div>
                    </div>
                    <div id="noNodeSelectedMsg" class="no-node-message">
                        Select a node to edit its details.
                    </div>
                </div>
                <div class="tree-column">
                    <div class="tree-toolbar">
                        <button id="addRootNodeBtn">+ Add Root Node</button>
                        <button id="addChildNodeBtn" disabled>+ Add Child</button>
                        <button id="deleteNodeBtn" disabled>🗑 Delete</button>
                    </div>
                    <div class="tree-container" id="treeContainer"></div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="cancel" id="treeCancelBtn">Cancel</button>
                <button class="save" id="treeSaveBtn">Save Tree</button>
            </div>
        </div>
    </div>

    <!-- Simple Modal -->
    <div id="simpleModal" class="modal">
        <div class="modal-content" id="simpleModalContent"></div>
    </div>

    <!-- Root Script Modal (created dynamically) -->
    <!-- Node Script Modal (created dynamically) -->
</body>
</html>
