<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alto · chat</title>
    <link rel="stylesheet" href="/static/chat/style/style.css">
</head>
<body>
    <header class="chat-header">
        <div style="display: flex; align-items: center; gap: 16px;">
            <h2>Alto 0.1a</h2>
            <p>pipeline · streams</p>
        </div>
        <button id="logoutBtn" style="background: transparent; border: 1px solid #6c63ff; padding: 6px 12px; border-radius: 30px;">Logout</button>
    </header>
    
    <main class="messages" id="chat"></main>
    
    <footer class="input-area">
        <input type="text" id="message" placeholder="message" autofocus>
        <button onclick="sendMessage(false)">send</button>
    </footer>

    <script src="/static/chat/javascript/script.js"></script>
</body>
</html>
