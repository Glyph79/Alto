<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alto Trainer 0.2a · Full Editor</title>
    <!-- Core CSS -->
    <link rel="stylesheet" href="/static/styles/core/reset.css">
    <link rel="stylesheet" href="/static/styles/core/layout.css">
    <link rel="stylesheet" href="/static/styles/core/components.css">
    <link rel="stylesheet" href="/static/styles/core/utilities.css">
    <!-- Feature CSS (minimal overrides) -->
    <link rel="stylesheet" href="/static/styles/features/groups.css">
    <link rel="stylesheet" href="/static/styles/features/sections.css">
    <link rel="stylesheet" href="/static/styles/features/topics.css">
    <link rel="stylesheet" href="/static/styles/features/variants.css">
    <link rel="stylesheet" href="/static/styles/features/fallbacks.css">
</head>
<body>
    <header>
        <h1>Alto Trainer 0.2a</h1>
        <div class="model-bar">
            <span>Model:</span>
            <select id="modelSelect" disabled></select>
            <button id="createModelBtn">+ New</button>
            <button id="editModelBtn" disabled>✎ Edit</button>
            <button id="deleteModelBtn" disabled>🗑 Delete</button>
            <button id="importBtn">📂 Import</button>
            <button id="exportBtn" disabled>📤 Export</button>
        </div>
    </header>

    <div class="main-container">
        <div class="sidebar">
            <!-- Groups sidebar -->
            <div id="groupsSidebar" class="sidebar-section">
                <h3>Search</h3>
                <input type="text" id="groupSearch" placeholder="Search groups..." disabled>
                <h3>Sections</h3>
                <select id="sectionFilter" disabled>
                    <option value="All Sections">All Sections</option>
                </select>
                <h3>Sort By</h3>
                <select id="groupSort" disabled>
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                    <option value="questions-desc">Most questions</option>
                    <option value="questions-asc">Least questions</option>
                    <option value="answers-desc">Most answers</option>
                    <option value="answers-asc">Least answers</option>
                </select>
                <button id="addGroupBtn" class="primary" disabled>+ Add Group</button>
            </div>

            <!-- Sections sidebar -->
            <div id="sectionsSidebar" class="sidebar-section" style="display: none;">
                <h3>Search</h3>
                <input type="text" id="sectionSearch" placeholder="Search sections..." disabled>
                <h3>Sort By</h3>
                <select id="sectionSort" disabled>
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                    <option value="groups-desc">Most groups</option>
                    <option value="groups-asc">Least groups</option>
                </select>
                <button id="addSectionBtn" class="primary" disabled>+ Add Section</button>
            </div>

            <!-- Topics sidebar -->
            <div id="topicsSidebar" class="sidebar-section" style="display: none;">
                <h3>Search</h3>
                <input type="text" id="topicSearch" placeholder="Search topics..." disabled>
                <h3>Section Filter</h3>
                <select id="topicSectionFilter" disabled>
                    <option value="All Sections">All Sections</option>
                </select>
                <h3>Usage</h3>
                <select id="topicFilter" disabled>
                    <option value="all">All topics</option>
                    <option value="used">With groups</option>
                    <option value="unused">Unused</option>
                </select>
                <h3>Sort By</h3>
                <select id="topicSort" disabled>
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                    <option value="usage-desc">Most used</option>
                    <option value="usage-asc">Least used</option>
                </select>
                <button id="addTopicBtn" class="primary" disabled>+ Add Topic</button>
            </div>

            <!-- Variants sidebar -->
            <div id="variantsSidebar" class="sidebar-section" style="display: none;">
                <h3>Search</h3>
                <input type="text" id="variantSearch" placeholder="Search variants..." disabled>
                <h3>Section Filter</h3>
                <select id="variantSectionFilter" disabled>
                    <option value="All Sections">All Sections</option>
                </select>
                <h3>Sort By</h3>
                <select id="variantSort" disabled>
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                    <option value="section-asc">Section (A-Z)</option>
                    <option value="section-desc">Section (Z-A)</option>
                    <option value="words-desc">Most words</option>
                    <option value="words-asc">Least words</option>
                </select>
                <button id="addVariantBtn" class="primary" disabled>+ Add Variant</button>
            </div>

            <!-- Fallbacks sidebar -->
            <div id="fallbacksSidebar" class="sidebar-section" style="display: none;">
                <h3>Search</h3>
                <input type="text" id="fallbackSearch" placeholder="Search fallbacks..." disabled>
                <h3>Sort By</h3>
                <select id="fallbackSort" disabled>
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                    <option value="usage-desc">Most used</option>
                    <option value="usage-asc">Least used</option>
                    <option value="answers-desc">Most answers</option>
                    <option value="answers-asc">Least answers</option>
                </select>
                <button id="addFallbackBtn" class="primary" disabled>+ Add Fallback</button>
            </div>
        </div>

        <div class="content">
            <div class="tab-bar">
                <button id="groupsTab" class="tab active">Groups</button>
                <button id="sectionsTab" class="tab" disabled>Sections</button>
                <button id="topicsTab" class="tab" disabled>Topics</button>
                <button id="variantsTab" class="tab" disabled>Variants</button>
                <button id="fallbacksTab" class="tab" disabled>Fallbacks</button>
            </div>

            <!-- Groups content -->
            <div id="groupsContent">
                <div id="groupsGridContainer"></div>
                <div id="noModelsEmptyState" class="empty-state" style="display: none;">
                    <p>No models found. Create your first model to get started.</p>
                    <button id="createFirstModelBtn">Create Model</button>
                </div>
                <div id="noGroupsEmptyState" class="empty-state" style="display: none;">
                    <p>This model has no groups yet.</p>
                    <button id="createFirstGroupBtn">Add First Group</button>
                </div>
            </div>

            <!-- Other content containers -->
            <div id="sectionsContent" style="display: none;"><div id="sectionsGridContainer"></div></div>
            <div id="topicsContent" style="display: none;"><div id="topicsGridContainer"></div></div>
            <div id="variantsContent" style="display: none;"><div id="variantsGridContainer"></div></div>
            <div id="fallbacksContent" style="display: none;"><div id="fallbacksGridContainer"></div></div>
        </div>
    </div>

    <!-- Modal container (all modals will be injected here) -->
    <div id="modalContainer"></div>

    <!-- Global entry point (ES module) -->
    <script type="module" src="/static/global.js"></script>
</body>
</html>
