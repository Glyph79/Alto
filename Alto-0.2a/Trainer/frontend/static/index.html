<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alto Trainer 0.2a · Full Editor</title>
    <!-- Core CSS -->
    <link rel="stylesheet" href="/static/styles/core/reset.css">
    <link rel="stylesheet" href="/static/styles/core/layout.css">
    <link rel="stylesheet" href="/static/styles/core/components.css">
    <link rel="stylesheet" href="/static/styles/core/utilities.css">
    <!-- Feature CSS (minimal overrides) -->
    <link rel="stylesheet" href="/static/styles/features/groups.css">
    <link rel="stylesheet" href="/static/styles/features/sections.css">
    <link rel="stylesheet" href="/static/styles/features/topics.css">
    <link rel="stylesheet" href="/static/styles/features/variants.css">
    <link rel="stylesheet" href="/static/styles/features/fallbacks.css">
</head>
<body>
    <header>
        <h1>Alto Trainer 0.2a</h1>
        <div class="model-bar">
            <span>Model:</span>
            <select id="modelSelect" disabled></select>
            <button id="createModelBtn">+ New</button>
            <button id="editModelBtn" disabled>✎ Edit</button>
            <button id="deleteModelBtn" disabled>🗑 Delete</button>
            <button id="importBtn">📂 Import</button>
            <button id="exportBtn" disabled>📤 Export</button>
        </div>
    </header>

    <div class="main-container">
        <!-- Static sidebar – always visible, controls disabled per tab -->
        <div class="sidebar">
            <div class="sidebar-section">
                <h3>Search</h3>
                <input type="text" id="sidebarSearch" placeholder="Search..." autocomplete="off" disabled>
            </div>
            <div class="sidebar-section" id="topicFilterContainer">
                <h3>Topic</h3>
                <select id="topicFilter" disabled>
                    <option value="">All Topics</option>
                </select>
            </div>
            <div class="sidebar-section">
                <h3>Sort By</h3>
                <select id="sidebarSort" disabled>
                    <option value="name-asc">Name (A-Z)</option>
                    <option value="name-desc">Name (Z-A)</option>
                    <!-- Dynamic options will be added via JS per tab -->
                </select>
            </div>
            <button id="sidebarAddBtn" class="primary" disabled>+ Add</button>
        </div>

        <div class="content">
            <div class="tab-bar">
                <button id="groupsTab" class="tab active">Groups</button>
                <button id="sectionsTab" class="tab" disabled>Sections</button>
                <button id="topicsTab" class="tab" disabled>Topics</button>
                <button id="variantsTab" class="tab" disabled>Variants</button>
                <button id="fallbacksTab" class="tab" disabled>Fallbacks</button>
            </div>

            <!-- Groups content -->
            <div id="groupsContent">
                <div id="groupsGridContainer"></div>
                <div id="noModelsEmptyState" class="empty-state" style="display: none;">
                    <p>No models found. Create your first model to get started.</p>
                    <button id="createFirstModelBtn">Create Model</button>
                </div>
                <div id="noGroupsEmptyState" class="empty-state" style="display: none;">
                    <p>This model has no groups yet.</p>
                    <button id="createFirstGroupBtn">Add First Group</button>
                </div>
            </div>

            <!-- Other content containers -->
            <div id="sectionsContent" style="display: none;"><div id="sectionsGridContainer"></div></div>
            <div id="topicsContent" style="display: none;"><div id="topicsGridContainer"></div></div>
            <div id="variantsContent" style="display: none;"><div id="variantsGridContainer"></div></div>
            <div id="fallbacksContent" style="display: none;"><div id="fallbacksGridContainer"></div></div>
        </div>
    </div>

    <!-- Modal container -->
    <div id="modalContainer"></div>

    <!-- Global entry point -->
    <script type="module" src="/static/global.js"></script>
</body>
</html>
